<section class="login-page">
  <div class="login-card">
    <h1>登入</h1>
    <p class="hint">請輸入帳號密碼</p>

    <label>
      <span>帳號</span>
      <input [(ngModel)]="name" autocomplete="username" />
    </label>

    <label>
      <span>密碼</span>
      <input [(ngModel)]="pwd" type="password" autocomplete="current-password" />
    </label>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }

    <button type="button" [disabled]="isLoggingIn" (click)="submit()">
      {{ isLoggingIn ? '登入中...' : '登入' }}
    </button>
  </div>
</section>
