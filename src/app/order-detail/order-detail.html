<section class="detail-page">
  <header class="page-header">
    <h1>Order Detail</h1>
    <a routerLink="/" class="back-link">Back to List</a>
  </header>

  @if (isLoading) {
    <div class="status loading">讀取中...</div>
  } @else {
    @if (errorMessage) {
      <div class="status error">{{ errorMessage }}</div>
    }

    <section class="card">
      <h2>Order</h2>
      <div class="grid">
        <label>
          <span>number</span>
          <input
            [(ngModel)]="form.order.number"
            name="orderNumber"
            class="readonly-field"
            readonly
          />
        </label>
        <label>
          <span>type of business</span>
          <input
            [value]="form.order.typeOfBusiness"
            name="typeOfBusiness"
            class="readonly-field"
            readonly
          />
        </label>
        <label>
          <span>type of order</span>
          <input [(ngModel)]="form.order.typeOfOrder" name="typeOfOrder" />
        </label>
        <label>
          <span>status</span>
          <input
            [value]="form.order.status"
            name="status"
            class="readonly-field"
            readonly
          />
        </label>
      </div>
    </section>

    <section class="card">
      <h2>Order Detail</h2>
      <div class="grid">
        <label>
          <span>item</span>
          <input [(ngModel)]="form.detail.item" name="item" />
        </label>
        <label>
          <span>quantity</span>
          <input [(ngModel)]="form.detail.quantity" name="quantity" />
        </label>
        <label>
          <span>unit</span>
          <input [(ngModel)]="form.detail.unit" name="unit" />
        </label>
        <label>
          <span>description of goods</span>
          <input [(ngModel)]="form.detail.descriptionOfGoods" name="descriptionOfGoods" />
        </label>
        <label>
          <span>shipper</span>
          <input [(ngModel)]="form.detail.shipper" name="shipper" />
        </label>
        <label>
          <span>por</span>
          <input [(ngModel)]="form.detail.por" name="por" />
        </label>
        <label>
          <span>shipper phone</span>
          <input [(ngModel)]="form.detail.shipperPhone" name="shipperPhone" />
        </label>
        <label>
          <span>shipper email</span>
          <input [(ngModel)]="form.detail.shipperEmail" name="shipperEmail" />
        </label>
        <label>
          <span>consignee</span>
          <input [(ngModel)]="form.detail.consignee" name="consignee" />
        </label>
        <label>
          <span>pod</span>
          <input [(ngModel)]="form.detail.pod" name="pod" />
        </label>
        <label>
          <span>consignee phone</span>
          <input [(ngModel)]="form.detail.consigneePhone" name="consigneePhone" />
        </label>
        <label>
          <span>consignee email</span>
          <input [(ngModel)]="form.detail.consigneeEmail" name="consigneeEmail" />
        </label>
        <label>
          <span>shipping method</span>
          <select
            [(ngModel)]="form.detail.shippingMethod"
            name="shippingMethod"
            [disabled]="!!form.detail.trackingNumber.trim()"
          >
            <option value="">請選擇</option>
            @if (form.detail.shippingMethod && !isPresetShippingMethod(form.detail.shippingMethod)) {
              <option [value]="form.detail.shippingMethod">{{ form.detail.shippingMethod }}</option>
            }
            <option value="直送">直送</option>
            <option value="轉運">轉運</option>
          </select>
        </label>
        <label>
          <span>tracking number</span>
          <div class="tracking-row">
            <input
              [(ngModel)]="form.detail.trackingNumber"
              name="trackingNumber"
              class="readonly-field"
              readonly
            />
            @if (form.detail.trackingNumber.trim()) {
              <button
                type="button"
                class="dispatch"
                (click)="openShipmentByTracking()"
              >
                查看貨運單
              </button>
            }
            @if (!form.detail.trackingNumber.trim()) {
              <button
                type="button"
                class="dispatch"
                [disabled]="isUpdating"
                (click)="dispatch()"
              >
                配送
              </button>
            }
          </div>
        </label>

        <label>
          <span>eta</span>
          <input [(ngModel)]="form.detail.eta" name="eta" />
        </label>

        @if (form.order.typeOfBusiness === 'B2B') {
          <label>
            <span>container</span>
            <select [(ngModel)]="form.detail.container" name="container">
              <option [ngValue]="true">是</option>
              <option [ngValue]="false">否</option>
            </select>
          </label>
        }

        @if (form.order.typeOfBusiness === 'B2C') {
          <label>
            <span>category</span>
            <input [(ngModel)]="form.detail.category" name="category" />
          </label>
          <label>
            <span>two way</span>
            <select [(ngModel)]="form.detail.twoWay" name="twoWay">
              <option [ngValue]="true">是</option>
              <option [ngValue]="false">否</option>
            </select>
          </label>
        }

        <label class="full">
          <span>note</span>
          <textarea [(ngModel)]="form.detail.note" name="note" rows="3"></textarea>
        </label>
      </div>
    </section>

    <div class="actions">
      <button type="button" class="primary" [disabled]="isUpdating" (click)="update()">
        {{ isUpdating ? '更新中...' : '更新' }}
      </button>
      <button type="button" class="secondary" (click)="reset()">重設</button>
      <button type="button" class="ghost" (click)="finish()">結束</button>
    </div>

    @if (successMessage) {
      <div class="status success">{{ successMessage }}</div>
    }
  }
</section>
